<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>Cloud Phone Dictation</title>
<style>
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0; background: #1e1e1e; color: #eee;
    font-family: -apple-system, Segoe UI, Roboto, Arial, sans-serif;
    font-size: 11px; /* Condensed for feature phones */
  }
  body { padding: 8px; max-width: 100%; margin: 0 auto; }
  h1 { font-size: 15px; margin: 0 0 4px 0; }
  .sub { color: #999; font-size: 10px; margin-bottom: 12px; line-height: 1.3; }
  
  .panel { background: #262626; border: 1px solid #3a3a3a; border-radius: 6px; padding: 10px; margin-bottom: 10px; }
  .panel-title { font-size: 10px; color: #8ab4f8; text-transform: uppercase; font-weight: 700; margin-bottom: 8px; }
  
  .controls-grid { display: flex; flex-direction: column; gap: 8px; margin-bottom: 12px; }
  label { font-size: 11px; color: #aaa; margin-bottom: 2px; display: block; }
  select {
    width: 100%; background: #1a1a1a; border: 1px solid #3a3a3a; border-radius: 4px; color: #eee; padding: 6px; font-size: 12px;
  }
  
  button {
    width: 100%; padding: 12px; font-weight: bold; border-radius: 6px; border: none; cursor: pointer; font-size: 14px;
    transition: background 0.1s; display: flex; justify-content: center; align-items: center; gap: 6px;
  }
  .btn-primary { background: #3b82f6; color: #fff; }
  .btn-primary:active { background: #2f6fd6; }
  button:disabled { opacity: 0.5; cursor: not-allowed; }

  .transcript-box {
    background: #1a1a1a; border: 1px solid #3a3a3a; border-radius: 4px; padding: 8px; min-height: 80px;
    font-size: 12px; line-height: 1.5; white-space: pre-wrap; color: #fff;
  }
  
  #dictation-status { margin-top: 8px; font-size: 11px; color: #aaa; text-align: center; height: 14px; }
  .status-ok { color: #4caf50; }
  .status-err { color: #f44336; }
  .status-warn { color: #ffb300; }
</style>
</head>
<body>

<h1>🎤 Dictation</h1>
<div class="sub">Record audio locally and send it to the server for text transcription.</div>

<div class="panel">
  <div class="controls-grid">
    <div>
      <label for="audio-api-select">Capture Method</label>
      <select id="audio-api-select">
        <option value="native-capture">Native OS Recorder (Best for Cloud Phone)</option>
        <option value="file-upload">File Upload (Choose existing audio)</option>
        <option value="mr-webm-opus">Inline MediaRecorder (WebM/Opus)</option>
        <option value="mr-default">Inline MediaRecorder (Browser Default)</option>
      </select>
    </div>
  </div>
  
  <button id="btn-master-dictate" class="btn-primary">
    🔴 Start Recording
  </button>
  
  <div id="dictation-status">Ready.</div>
</div>

<div class="panel">
  <div class="panel-title">Transcription Result</div>
  <div class="transcript-box" id="transcript-output">Waiting for audio...</div>
</div>

<script>
(function () {
  'use strict';

  // --- RECORDING IMPLEMENTATIONS ---

  // 1. Native OS File Input (Bypasses Sandbox)
  function recordViaFileInput(useCapture) {
    return new Promise(function (resolve, reject) {
      var input = document.createElement('input');
      input.type = 'file'; 
      input.accept = 'audio/*';
      if (useCapture) input.setAttribute('capture', 'microphone');
      input.style.display = 'none'; 
      document.body.appendChild(input);
      
      var settled = false;
      input.addEventListener('change', function () {
        if (settled) return; settled = true;
        var file = input.files && input.files[0]; 
        document.body.removeChild(input);
        if (!file) { reject(new Error('No file selected (cancelled)')); return; }
        resolve(file);
      }, { once: true });
      
      input.addEventListener('cancel', function () {
        if (settled) return; settled = true; 
        document.body.removeChild(input); 
        reject(new Error('File dialog cancelled'));
      }, { once: true });
      
      input.click();
    });
  }

  // 2. Inline MediaRecorder (For PC/Standard Browsers)
  function recordViaMediaRecorder(mimeType, durationMs) {
    durationMs = durationMs || 5000; // 5-second test limit for inline
    return new Promise(function (resolve, reject) {
      if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) { 
        reject(new Error('Live mic access blocked or unsupported here.')); return; 
      }
      navigator.mediaDevices.getUserMedia({ audio: true }).then(function (stream) {
        var recorder;
        try { 
          recorder = mimeType ? new MediaRecorder(stream, { mimeType: mimeType }) : new MediaRecorder(stream); 
        } catch (err) { 
          stream.getTracks().forEach(function(t){ t.stop(); }); reject(err); return; 
        }
        
        var chunks = [];
        recorder.ondataavailable = function (e) { if (e.data && e.data.size > 0) chunks.push(e.data); };
        recorder.onerror = function (e) { 
          stream.getTracks().forEach(function(t){ t.stop(); }); reject(new Error('MediaRecorder error')); 
        };
        recorder.onstop = function () {
          stream.getTracks().forEach(function(t){ t.stop(); });
          resolve(new Blob(chunks, { type: recorder.mimeType || mimeType || 'audio/webm' }));
        };
        
        recorder.start();
        // Stop automatically after X seconds
        setTimeout(function () { if (recorder.state !== 'inactive') recorder.stop(); }, durationMs);
      }).catch(reject);
    });
  }

  // --- API DEFINITIONS ---
  var recordingMethods = [
    { id: 'native-capture', run: function () { return recordViaFileInput(true); } },
    { id: 'file-upload',    run: function () { return recordViaFileInput(false); } },
    { id: 'mr-webm-opus',   run: function () { return recordViaMediaRecorder('audio/webm;codecs=opus'); } },
    { id: 'mr-default',     run: function () { return recordViaMediaRecorder(null); } }
  ];

  // --- UI LOGIC ---
  var apiSelect = document.getElementById('audio-api-select');
  var btnMasterDictate = document.getElementById('btn-master-dictate');
  var dictationStatus = document.getElementById('dictation-status');
  var transcriptOutput = document.getElementById('transcript-output');

  function setStatus(msg, className) {
    dictationStatus.textContent = msg;
    dictationStatus.className = className || '';
  }

  btnMasterDictate.addEventListener('click', function() {
    var selectedId = apiSelect.value;
    var selectedMethod = null;
    
    for (var i=0; i<recordingMethods.length; i++) {
      if (recordingMethods[i].id === selectedId) selectedMethod = recordingMethods[i];
    }
    
    if (!selectedMethod) return;

    // 1. Prepare UI
    btnMasterDictate.disabled = true;
    btnMasterDictate.innerHTML = '⏳ Waiting for audio...';
    setStatus('Opening capture interface...', 'status-warn');
    transcriptOutput.textContent = 'Recording in progress...';
    
    // 2. Trigger Capture
    selectedMethod.run().then(function(blob) {
      
      setStatus('Audio captured! (' + (blob.size / 1024).toFixed(1) + ' KB)', 'status-ok');
      transcriptOutput.textContent = 'Audio acquired. Ready to send to server...';
      
      // ---------------------------------------------------------
      // 🚀 SERVER UPLOAD LOGIC GOES HERE
      // ---------------------------------------------------------
      // Example of how you will eventually send this to your backend:
      /*
      var formData = new FormData();
      formData.append('audioFile', blob, 'dictation.wav');
      
      transcriptOutput.textContent = 'Uploading to server...';
      
      fetch('https://your-server-url.com/api/transcribe', {
        method: 'POST',
        body: formData
      })
      .then(response => response.json())
      .then(data => {
        transcriptOutput.textContent = data.transcriptionText;
      })
      .catch(err => {
        transcriptOutput.textContent = 'Server Error: ' + err.message;
      });
      */
      // ---------------------------------------------------------

    }).catch(function(err) {
      var msg = (err && err.message) ? err.message : String(err);
      setStatus('Failed: ' + msg, 'status-err');
      transcriptOutput.textContent = 'Failed to get audio.';
    }).finally(function() {
      // 3. Reset Button
      btnMasterDictate.disabled = false;
      btnMasterDictate.innerHTML = '🔴 Start Recording';
    });
  });

})();
</script>
</body>
</html>
