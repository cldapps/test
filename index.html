<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>Cloud Phone Test Suite</title>
<style>
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0; background: #1e1e1e; color: #eee;
    font-family: -apple-system, Segoe UI, Roboto, Arial, sans-serif;
    font-size: 13px;
  }
  body { padding: 10px; }
  h1 { font-size: 18px; margin: 4px 0 4px 0; }
  .sub { color: #999; font-size: 11px; margin-bottom: 16px; }
  .panel { background: #262626; border: 1px solid #3a3a3a; border-radius: 8px; padding: 10px; margin-bottom: 12px; }
  .search {
    width: 100%; background: #1a1a1a; border: 1px solid #3a3a3a; border-radius: 6px;
    color: #eee; padding: 8px 10px; font-size: 13px; margin-bottom: 12px;
  }
  .search:focus { outline: none; border-color: #3b82f6; }
  .group { margin-bottom: 18px; }
  .group-title {
    font-size: 11px; color: #8ab4f8; text-transform: uppercase; letter-spacing: .04em;
    margin: 0 0 8px 2px; font-weight: 700;
  }
  .test-list { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 10px; }
  a.test-card {
    display: flex; flex-direction: column; gap: 4px; text-decoration: none; color: inherit;
    background: #2c2c2c; border: 1px solid #3a3a3a; border-radius: 10px; padding: 12px;
    transition: border-color .12s, background .12s;
  }
  a.test-card:hover { border-color: #3b82f6; background: #303030; }
  .test-card .top-row { display: flex; align-items: center; gap: 8px; }
  .test-card .icon { font-size: 20px; line-height: 1; }
  .test-card .name { font-size: 13.5px; font-weight: 700; flex: 1; }
  .test-card .badge {
    font-size: 9.5px; text-transform: uppercase; letter-spacing: .03em; font-weight: 700;
    padding: 2px 6px; border-radius: 999px; white-space: nowrap;
  }
  .badge-ready { background: #1b3a1f; color: #4caf50; }
  .badge-draft { background: #3a341b; color: #ffb300; }
  .badge-planned { background: #2a2a3a; color: #8ab4f8; }
  .test-card .desc { font-size: 11.5px; color: #aaa; line-height: 1.4; }
  .test-card .file { font-size: 10px; color: #666; font-family: monospace; margin-top: 2px; }
  .empty-note { color: #888; font-size: 12px; padding: 8px; }
  .add-card {
    display: flex; align-items: center; justify-content: center; text-align: center;
    background: transparent; border: 1px dashed #444; border-radius: 10px; padding: 12px;
    color: #777; font-size: 11.5px; line-height: 1.5;
  }
</style>
</head>
<body>

<h1>📱 Cloud Phone Test Suite</h1>
<div class="sub">A growing collection of API compatibility test pages for Cloud Phone (and wherever else this gets loaded). Pick a suite below to run its tests.</div>

<input class="search" id="search-box" type="text" placeholder="Filter tests… (e.g. &quot;video&quot;, &quot;storage&quot;, &quot;draft&quot;)" autocomplete="off">

<div id="groups"></div>

<script>
(function () {
  'use strict';

  // ─────────────────────────────────────────────────────────────────
  // TEST REGISTRY — add a new test page by adding one object here.
  //   id:       unique string
  //   name:     display name
  //   file:     relative path to the page (must sit next to this index.html)
  //   icon:     an emoji shown on the card
  //   category: groups cards under a heading
  //   status:   'ready' | 'draft' | 'planned'  (controls the badge + whether it's clickable)
  //   desc:     one or two sentence summary of what it covers
  // ─────────────────────────────────────────────────────────────────
  var TESTS = [
    {
      id: 'audio',
      name: 'Audio API Test Suite',
      file: 'audtest.html',
      icon: '🎙',
      category: 'Media',
      status: 'ready',
      desc: 'Every recording API × every playback API for audio — MediaRecorder, Web Audio PCM, file input capture, Blob URL / Data URI / MediaSource playback, with an audible/silent confirmation matrix.'
    },
    {
      id: 'video',
      name: 'Video API Test Suite',
      file: 'vidtest.html',
      icon: '🎬',
      category: 'Media',
      status: 'ready',
      desc: 'Every recording API × every playback API for video — camera capture, a built-in synthetic sample-video generator (no camera needed), and a blank-frame detector alongside the usual playback matrix.'
    }
  ];

  // ─────────────────────────────────────────────────────────────────

  var statusBadge = { ready: ['badge-ready', 'Ready'], draft: ['badge-draft', 'Draft'], planned: ['badge-planned', 'Planned'] };

  var groupsEl = document.getElementById('groups');
  var searchBox = document.getElementById('search-box');

  function render(filterText) {
    groupsEl.innerHTML = '';
    var q = (filterText || '').trim().toLowerCase();

    var filtered = TESTS.filter(function (t) {
      if (!q) return true;
      return (t.name + ' ' + t.desc + ' ' + t.category + ' ' + t.status).toLowerCase().indexOf(q) !== -1;
    });

    if (filtered.length === 0) {
      var empty = document.createElement('div'); empty.className = 'empty-note';
      empty.textContent = 'No tests match "' + filterText + '".';
      groupsEl.appendChild(empty);
      return;
    }

    var byCategory = {};
    var order = [];
    filtered.forEach(function (t) {
      var cat = t.category || 'Other';
      if (!byCategory[cat]) { byCategory[cat] = []; order.push(cat); }
      byCategory[cat].push(t);
    });

    order.forEach(function (cat) {
      var group = document.createElement('div'); group.className = 'group';
      var title = document.createElement('div'); title.className = 'group-title'; title.textContent = cat;
      group.appendChild(title);

      var list = document.createElement('div'); list.className = 'test-list';
      byCategory[cat].forEach(function (t) {
        var card = document.createElement('a'); card.className = 'test-card';
        var clickable = t.status !== 'planned';
        card.href = clickable ? t.file : '#';
        if (!clickable) {
          card.addEventListener('click', function (e) { e.preventDefault(); });
          card.style.opacity = '0.65'; card.style.cursor = 'default';
        }

        var topRow = document.createElement('div'); topRow.className = 'top-row';
        var iconEl = document.createElement('span'); iconEl.className = 'icon'; iconEl.textContent = t.icon || '🧪';
        var nameEl = document.createElement('span'); nameEl.className = 'name'; nameEl.textContent = t.name;
        var badgeInfo = statusBadge[t.status] || statusBadge.planned;
        var badgeEl = document.createElement('span'); badgeEl.className = 'badge ' + badgeInfo[0]; badgeEl.textContent = badgeInfo[1];
        topRow.appendChild(iconEl); topRow.appendChild(nameEl); topRow.appendChild(badgeEl);

        var descEl = document.createElement('div'); descEl.className = 'desc'; descEl.textContent = t.desc || '';
        var fileEl = document.createElement('div'); fileEl.className = 'file'; fileEl.textContent = clickable ? t.file : 'not yet created';

        card.appendChild(topRow); card.appendChild(descEl); card.appendChild(fileEl);
        list.appendChild(card);
      });

      // "add a new test" hint card, only on the last group when unfiltered
      group.appendChild(list);
      groupsEl.appendChild(group);
    });

    if (!q) {
      var hint = document.createElement('div'); hint.className = 'panel';
      hint.innerHTML = '';
      var hintText = document.createElement('div'); hintText.className = 'sub';
      hintText.style.margin = '0';
      hintText.textContent = 'To add a new test suite: drop a new .html file next to this index, then add an entry to the TESTS array at the top of index.html\u2019s script (id, name, file, icon, category, status, desc). It will show up here automatically.';
      hint.appendChild(hintText);
      groupsEl.appendChild(hint);
    }
  }

  searchBox.addEventListener('input', function () { render(searchBox.value); });

  render('');
})();
</script>
</body>
</html>
