<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="theme-color" content="#0b0b16">
<link rel="manifest" href="./manifest.json">
<link rel="apple-touch-icon" href="./icon-192.png">
<title>IPTV Lite</title>
<style>
/* ═══════════════════════════════════════════
   IPTV Lite — simple flat dark UI
   One accent color, no blur, no gradients.
   Built for Cloud Phone D-pad navigation.
═══════════════════════════════════════════ */
:root {
  --bg:        #0b0b16;
  --bg-soft:   #12111f;
  --panel:     rgba(255,255,255,0.05);
  --border:    rgba(255,255,255,0.10);
  --accent:    #7c5cff;
  --accent-dim:rgba(124,92,255,0.18);

  --txt:       #ececf5;
  --txt-dim:   #9a96b4;
  --txt-mute:  #6b6680;

  --danger:    #ff6b81;
  --warn:      #ffb454;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  width: 100%; height: 100%;
  background: var(--bg);
  color: var(--txt);
  font-family: system-ui, -apple-system, "Segoe UI", Roboto, Arial, sans-serif;
  font-size: 13px;
  overflow: hidden;
}

#app { width: 100%; height: 100%; display: flex; flex-direction: column; position: relative; }

.screen { display: none; flex: 1; flex-direction: column; overflow: hidden; min-height: 0; }
.screen.active { display: flex; }

/* ══════════════════════════════
   HEADER
══════════════════════════════ */
.app-header {
  background: var(--bg-soft);
  border-bottom: 2px solid var(--accent);
  padding: 0 10px;
  height: 30px;
  display: flex; align-items: center; justify-content: space-between;
  flex-shrink: 0;
}
.app-header-title {
  font-size: 13px; font-weight: 700;
  color: var(--txt);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  max-width: 70%;
}
.app-header-badge {
  font-size: 10px; font-weight: 500;
  color: var(--txt-mute);
  flex-shrink: 0;
}

/* ══════════════════════════════
   LOGIN SCREEN
══════════════════════════════ */
#loginScreen { padding: 0; justify-content: flex-start; overflow-y: auto; }

.login-hero { padding: 22px 10px 14px; text-align: center; }
.logo {
  font-size: 26px; font-weight: 800;
  color: var(--accent);
  letter-spacing: 0.5px;
  line-height: 1;
}
.logo-sub {
  font-size: 10px; font-weight: 600;
  color: var(--txt-mute);
  letter-spacing: 3px;
  margin-top: 4px;
  text-transform: uppercase;
}

.login-form { padding: 4px 12px 10px; }

label {
  display: block;
  font-size: 10px; font-weight: 600;
  color: var(--txt-mute);
  text-transform: uppercase;
  letter-spacing: 0.5px;
  margin-top: 10px; margin-bottom: 4px;
}
input {
  width: 100%;
  font-size: 13px;
  padding: 8px 9px;
  background: var(--panel);
  color: var(--txt);
  border: 1px solid var(--border);
  border-radius: 6px;
  outline: none;
  caret-color: var(--accent);
}
input::placeholder { color: var(--txt-mute); }
input:focus { border-color: var(--accent); }

/* ══════════════════════════════
   BUTTONS
══════════════════════════════ */
.btn {
  display: block; width: 100%;
  padding: 9px 10px;
  background: var(--panel);
  color: var(--txt);
  border: 1px solid var(--border);
  border-radius: 6px;
  text-align: center;
  font-size: 13px; font-weight: 600;
  cursor: pointer;
  margin-top: 8px;
}
#loginBtn { background: var(--accent); border-color: var(--accent); color: #fff; }
.btn.focused { border-color: var(--accent); box-shadow: 0 0 0 2px var(--accent-dim); }
.btn.small-btn {
  font-size: 10.5px; font-weight: 500;
  padding: 6px 10px;
  color: var(--txt-dim);
  background: transparent;
  border-color: rgba(255,255,255,0.08);
  margin-top: 4px;
}
.btn.small-btn.focused { border-color: var(--accent); color: var(--txt); background: var(--panel); }

/* ══════════════════════════════
   LISTS
══════════════════════════════ */
ul { list-style: none; flex: 1; overflow-y: auto; overflow-x: hidden; padding: 4px; }
ul::-webkit-scrollbar { width: 2px; }
ul::-webkit-scrollbar-thumb { background: var(--border); }

li {
  position: relative;
  padding: 8px 10px;
  margin-bottom: 2px;
  border-radius: 6px;
  font-size: 13px; font-weight: 500;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  display: flex; align-items: center; gap: 8px;
  cursor: pointer;
  color: var(--txt-dim);
  border-left: 3px solid transparent;
}
li .slot {
  display: inline-flex; align-items: center; justify-content: center;
  min-width: 18px; height: 17px;
  background: var(--accent);
  color: #fff;
  border-radius: 4px;
  font-size: 10.5px; font-weight: 700;
  flex-shrink: 0;
}
li.focused {
  background: var(--accent-dim);
  border-left-color: var(--accent);
  color: var(--txt);
}
li.empty { color: var(--txt-mute); font-style: italic; font-weight: 400; cursor: default; }

/* ══════════════════════════════
   STATUS / HINT
══════════════════════════════ */
.status { font-size: 11px; color: var(--danger); padding: 5px 10px; min-height: 18px; font-weight: 500; }
.hint {
  font-size: 10px; color: var(--txt-mute);
  padding: 6px 10px; line-height: 1.5;
  border-top: 1px solid var(--border);
  flex-shrink: 0;
}
.hint b { color: var(--accent); font-weight: 700; }

/* ══════════════════════════════
   HOME SCREEN
══════════════════════════════ */
#homeScreen { overflow: hidden; }
#homeScreen .fav-area { flex: 1; overflow-y: auto; overflow-x: hidden; display: flex; flex-direction: column; min-height: 0; }
#homeScreen .home-btns { flex-shrink: 0; padding: 6px 8px 8px; }

/* ══════════════════════════════
   PLAYER SCREEN
   NOTE: nothing here uses backdrop-filter/blur. The video is repainting
   constantly, and any blurred overlay sitting above it has to re-sample
   the video every frame — that's wasted GPU work on a feature phone and
   was the source of stutter. Solid, slightly-opaque panels read just as
   well and cost nothing extra.
══════════════════════════════ */
#playerScreen { padding: 0; position: relative; background: #000; }
#playerScreen video {
  width: 100%; height: 100%;
  background: #000; display: block;
  object-fit: contain;
}
#playerScreen video.rotated {
  position: absolute; top: 50%; left: 50%;
  width: 100vh; height: 100vw;
  transform: translate(-50%, -50%) rotate(90deg);
}

#playerOverlay {
  position: absolute; top: 6px; left: 6px; right: 6px;
  z-index: 10; pointer-events: none;
  display: flex; gap: 5px; align-items: flex-start; flex-wrap: wrap;
}
#playerOverlay span {
  background: rgba(11,11,22,0.88);
  border: 1px solid var(--border);
  color: var(--txt);
  font-size: 11px; font-weight: 600;
  padding: 3px 8px;
  border-radius: 5px;
}

.player-status {
  position: absolute; inset: 0; z-index: 15;
  display: none;
  flex-direction: column; align-items: center; justify-content: center;
  gap: 8px;
  background: rgba(6,6,12,0.55);
  color: var(--txt);
  text-align: center;
  font-size: 12px; font-weight: 600;
  padding: 0 20px;
}
.player-status.loading, .player-status.error { display: flex; }
.player-status .spinner {
  width: 24px; height: 24px;
  border-radius: 50%;
  border: 3px solid rgba(255,255,255,0.18);
  border-top-color: var(--accent);
  animation: spin 800ms linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
.player-status .err-icon { font-size: 20px; color: var(--warn); }
.player-status .err-hint { font-size: 10.5px; color: var(--txt-mute); font-weight: 500; }

#toast {
  position: absolute; bottom: 12px; left: 8px; right: 8px;
  background: rgba(11,11,22,0.92);
  border: 1px solid var(--accent);
  border-radius: 6px;
  color: var(--txt);
  font-size: 12.5px; font-weight: 600;
  padding: 7px 12px;
  text-align: center;
  z-index: 20; display: none;
}

/* ══════════════════════════════
   CHANNEL OSD (in-player zapper)
══════════════════════════════ */
#channelOsd {
  position: absolute; top: 8px; right: 8px; bottom: 8px;
  width: 60%; max-width: 200px;
  z-index: 12;
  display: flex; flex-direction: column;
  background: rgba(10,9,20,0.94);
  border: 1px solid var(--border);
  border-radius: 8px;
  opacity: 0; transform: translateX(8px);
  pointer-events: none;
  transition: opacity 120ms ease, transform 120ms ease;
  overflow: hidden;
}
#channelOsd.open { opacity: 1; transform: translateX(0); pointer-events: auto; }
.channel-osd-header {
  flex-shrink: 0;
  font-size: 10px; font-weight: 700;
  letter-spacing: 0.4px; text-transform: uppercase;
  color: var(--txt-mute);
  padding: 8px 9px 6px;
  border-bottom: 1px solid var(--border);
}
#channelOsdList { flex: 1; overflow-y: auto; padding: 4px; }
#channelOsdList li { font-size: 12px; padding: 7px 9px; }

/* ══════════════════════════════
   CONFIRMATION DIALOG
══════════════════════════════ */
#confirmDlg {
  display: none; position: absolute; inset: 0; z-index: 100;
  background: rgba(4,4,10,0.75);
  flex-direction: column; align-items: center; justify-content: center;
  gap: 10px;
}
#confirmDlg.active { display: flex; }
#confirmDlg .dlg-box {
  background: var(--bg-soft);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 16px 16px 12px;
  text-align: center;
  max-width: 200px;
  color: var(--txt);
  font-size: 12.5px;
  line-height: 1.5;
}
#confirmDlg .dlg-btns { display: flex; gap: 8px; }
#confirmDlg .dlg-btn {
  padding: 6px 20px;
  font-size: 13px; font-weight: 700;
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: 6px;
  color: var(--txt);
  cursor: pointer;
}
#confirmDlg .dlg-btn.ok { background: var(--accent); border-color: var(--accent); color: #fff; }
#confirmDlg .dlg-btn.focused { box-shadow: 0 0 0 2px var(--accent-dim); }
</style>
</head>
<body>
<div id="app">

  <!-- CONFIRM DIALOG -->
  <div id="confirmDlg">
    <div class="dlg-box" id="confirmMsg"></div>
    <div class="dlg-btns">
      <div class="dlg-btn ok" id="confirmOk">YES</div>
      <div class="dlg-btn" id="confirmNo">NO</div>
    </div>
  </div>

  <!-- LOGIN SCREEN -->
  <div class="screen active" id="loginScreen">
    <div class="login-hero">
      <div class="logo">IPTV</div>
      <div class="logo-sub">L I T E</div>
    </div>
    <div class="login-form">
      <label>Server URL</label>
      <input id="serverInput" type="text" autocomplete="off" placeholder="http://server:port">
      <label>Username</label>
      <input id="userInput" type="text" autocomplete="off">
      <label>Password</label>
      <input id="passInput" type="password" autocomplete="off">
      <div class="btn focused" id="loginBtn">Connect</div>
      <div class="status" id="loginStatus"></div>
      <div class="hint">Login saved on device — won't ask again next time.</div>
    </div>
  </div>

  <!-- HOME / FAVORITES SCREEN -->
  <div class="screen" id="homeScreen">
    <div class="app-header">
      <span class="app-header-title">Favorites</span>
      <span class="app-header-badge">IPTV Lite</span>
    </div>
    <div class="fav-area">
      <ul id="favList"></ul>
      <div class="hint" id="favHint"></div>
    </div>
    <div class="home-btns">
      <div class="btn" id="browseBtn">Browse All Channels</div>
      <div class="btn small-btn" id="logoutBtn">Logout / Switch Account</div>
    </div>
  </div>

  <!-- CATEGORY SCREEN -->
  <div class="screen" id="catScreen">
    <div class="app-header">
      <span class="app-header-title">Categories</span>
      <span class="app-header-badge">&#9664; BACK</span>
    </div>
    <ul id="catList"></ul>
    <div class="status" id="catStatus"></div>
  </div>

  <!-- CHANNEL SCREEN -->
  <div class="screen" id="chanScreen">
    <div class="app-header">
      <span class="app-header-title" id="chanTitle">CHANNELS</span>
      <span class="app-header-badge">&#9664; BACK</span>
    </div>
    <ul id="chanList"></ul>
    <div class="status" id="chanStatus"></div>
    <div class="hint">&#9650;&#9660; navigate &nbsp; &#9654; play &nbsp; Press <b>*#</b> vol</div>
  </div>

  <!-- PLAYER SCREEN -->
  <div class="screen" id="playerScreen">
    <div id="playerOverlay">
      <span id="nowPlaying"></span>
      <span id="rotateTag" style="display:none">&#8635; ROTATED</span>
    </div>
    <video id="video" playsinline webkit-playsinline x-webkit-airplay="allow"
      preload="none" tabindex="-1"></video>
    <div id="playerStatus" class="player-status"></div>
    <div id="channelOsd">
      <div class="channel-osd-header">&#9650;&#9660; Change channel</div>
      <ul id="channelOsdList"></ul>
    </div>
    <div id="toast"></div>
  </div>

</div>

<!-- HLS.js — required for reliable .m3u8 playback in Chromium (Cloud Phone's
     server-side Chromium and desktop Chrome alike have no native HLS support;
     pointing <video src="*.m3u8"> at the stream directly is unreliable). -->
<script src="https://cdn.jsdelivr.net/npm/hls.js@1/dist/hls.min.js"></script>

<script>
/* ═══════════════════════════════════════════
   IPTV Lite — Cloud Phone optimized
═══════════════════════════════════════════ */

/* ── State ── */
var state = {
  server: '', user: '', pass: '',
  categories: [], channels: [],
  favorites: {},
  currentChannel: null,
  currentChanIndex: -1,
  videoRotated: false,
  navStack: []
};

var STORAGE_LOGIN = 'iptvlite_login';
var STORAGE_FAV   = 'iptvlite_favorites';

/* ── Favorite triple-press tracking ── */
var favPressState = {};
var FAV_PRESS_TIMEOUT = 1200;

/* ── Persistence ── */
function loadLogin() {
  try { return JSON.parse(localStorage.getItem(STORAGE_LOGIN) || 'null'); } catch(e){ return null; }
}
function saveLogin() {
  try { localStorage.setItem(STORAGE_LOGIN, JSON.stringify({server:state.server,user:state.user,pass:state.pass})); } catch(e){}
}
function clearLogin() {
  try { localStorage.removeItem(STORAGE_LOGIN); } catch(e){}
}
function loadFavorites() {
  try { state.favorites = JSON.parse(localStorage.getItem(STORAGE_FAV) || '{}'); } catch(e){ state.favorites={}; }
}
function saveFavorites() {
  try { localStorage.setItem(STORAGE_FAV, JSON.stringify(state.favorites)); } catch(e){}
}

/* ── Screen / navigation ── */
function showScreen(id, pushHistory) {
  if (pushHistory !== false) {
    var cur = document.querySelector('.screen.active');
    if (cur && cur.id !== id) state.navStack.push(cur.id);
  }
  var screens = document.querySelectorAll('.screen');
  for (var i = 0; i < screens.length; i++) screens[i].classList.remove('active');
  document.getElementById(id).classList.add('active');
}

function goBack() {
  if (state.navStack.length > 0) {
    var prev = state.navStack.pop();
    var screens = document.querySelectorAll('.screen');
    for (var i = 0; i < screens.length; i++) screens[i].classList.remove('active');
    document.getElementById(prev).classList.add('active');
  }
}

/* ── Unified back handler ──
   Cloud Phone's Right Soft Key fires a "back" event, which by default calls
   history.back() — and since this is a single-page app with no real history
   stack, that fell straight through to closing the widget. We intercept it
   everywhere and always route to in-app navigation, never exit. */
function handleBackAction() {
  if (document.getElementById('confirmDlg').classList.contains('active')) {
    if (confirmCallback) confirmCallback.no();
    closeConfirm();
    return;
  }
  if (osdState.open) { cancelChannelOsd(); return; }

  var activeId = document.querySelector('.screen.active').id;

  if (activeId === 'loginScreen') return; // nothing to go back to

  if (activeId === 'playerScreen') { stopPlayer(); return; }

  if (state.navStack.length > 0) { goBack(); return; }
  /* Home screen with an empty stack: stay put. RSK must never exit the widget. */
}

window.addEventListener('back', function (e) {
  e.preventDefault();
  handleBackAction();
});

/* ── Toast ── */
var toastTimer = null;
function showToast(msg, ms) {
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.style.display = 'block';
  clearTimeout(toastTimer);
  toastTimer = setTimeout(function(){ t.style.display='none'; }, ms || 1800);
}

/* ── Confirm dialog ── */
var confirmCallback = null;
var confirmFocus = 0;
function showConfirm(msg, onOk, onNo) {
  document.getElementById('confirmMsg').textContent = msg;
  confirmCallback = { ok: onOk, no: onNo || function(){} };
  confirmFocus = 0;
  updateConfirmFocus();
  document.getElementById('confirmDlg').classList.add('active');
}
function updateConfirmFocus() {
  document.getElementById('confirmOk').classList.toggle('focused', confirmFocus === 0);
  document.getElementById('confirmNo').classList.toggle('focused', confirmFocus !== 0);
}
function closeConfirm() {
  document.getElementById('confirmDlg').classList.remove('active');
  confirmCallback = null;
}
document.getElementById('confirmOk').addEventListener('click', function(){
  if (confirmCallback) confirmCallback.ok();
  closeConfirm();
});
document.getElementById('confirmNo').addEventListener('click', function(){
  if (confirmCallback) confirmCallback.no();
  closeConfirm();
});

/* ── Focus list helper ── */
function FocusList(container, onSelect) {
  this.container = container;
  this.items = [];
  this.index = 0;
  this.onSelect = onSelect;
}
FocusList.prototype.setItems = function(items) {
  this.items = items; this.index = 0; this.render();
};
FocusList.prototype.render = function() {
  for (var i = 0; i < this.container.children.length; i++)
    this.container.children[i].classList.toggle('focused', i === this.index);
};
FocusList.prototype.move = function(dir) {
  if (!this.items.length) return;
  this.index = (this.index + dir + this.items.length) % this.items.length;
  this.render();
  var el = this.container.children[this.index];
  if (el && el.scrollIntoView) el.scrollIntoView({ block: 'nearest' });
};
FocusList.prototype.select = function() {
  if (this.items.length) this.onSelect(this.items[this.index], this.index);
};

var catFocus = null, chanFocus = null, favFocus = null;
var homeBtnFocus = 0;

/* ── API helpers ── */
function apiUrl(action, extra) {
  var u = state.server.replace(/\/$/, '') + '/player_api.php?username=' +
    encodeURIComponent(state.user) + '&password=' + encodeURIComponent(state.pass);
  if (action) u += '&action=' + action;
  if (extra)  u += extra;
  return u;
}
function fetchJson(url, cb, errCb) {
  var xhr = new XMLHttpRequest();
  xhr.open('GET', url, true);
  xhr.timeout = 15000;
  xhr.onload = function() {
    if (xhr.status >= 200 && xhr.status < 300) {
      try { cb(JSON.parse(xhr.responseText)); }
      catch(e) { errCb('Bad response from server'); }
    } else { errCb('Server error: ' + xhr.status); }
  };
  xhr.onerror   = function(){ errCb('Network error - check URL / WiFi'); };
  xhr.ontimeout = function(){ errCb('Timed out'); };
  xhr.send();
}

/* ── Login ── */
function attemptLogin(server, user, pass, onSuccess, onFail) {
  state.server = server; state.user = user; state.pass = pass;
  fetchJson(apiUrl(null), function(data) {
    if (data && data.user_info && data.user_info.auth === 1) onSuccess();
    else onFail('Login failed - check credentials');
  }, onFail);
}
function doLoginFromForm() {
  var server = document.getElementById('serverInput').value.trim();
  var user   = document.getElementById('userInput').value.trim();
  var pass   = document.getElementById('passInput').value.trim();
  var st     = document.getElementById('loginStatus');
  if (!server || !user || !pass) { st.textContent = 'Fill in all fields'; return; }
  if (!/^https?:\/\//i.test(server)) server = 'http://' + server;
  st.textContent = 'Connecting...';
  attemptLogin(server, user, pass, function() {
    saveLogin(); st.textContent = ''; goHome();
  }, function(msg){ st.textContent = msg; });
}
function tryAutoLogin() {
  var saved = loadLogin();
  if (!saved || !saved.server || !saved.user || !saved.pass) {
    showScreen('loginScreen', false); return;
  }
  document.getElementById('serverInput').value = saved.server;
  document.getElementById('userInput').value   = saved.user;
  document.getElementById('passInput').value   = saved.pass;
  document.getElementById('loginStatus').textContent = 'Connecting...';
  attemptLogin(saved.server, saved.user, saved.pass, function() {
    goHome();
  }, function(msg) {
    document.getElementById('loginStatus').textContent = msg + ' (re-enter)';
    showScreen('loginScreen', false);
  });
}
function logout() {
  clearLogin();
  state.server = state.user = state.pass = '';
  document.getElementById('serverInput').value = '';
  document.getElementById('userInput').value   = '';
  document.getElementById('passInput').value   = '';
  document.getElementById('loginStatus').textContent = '';
  state.navStack = [];
  showScreen('loginScreen', false);
}

/* ── Home / Favorites ── */
function goHome() {
  state.navStack = [];
  renderFavorites();
  homeBtnFocus = 0;
  showScreen('homeScreen', false);
  updateHomeFocus();
}

function renderFavorites() {
  var ul = document.getElementById('favList');
  ul.innerHTML = '';
  var hintEl = document.getElementById('favHint');

  var addedSlots = [];
  var slots = ['1','2','3','4','5','6','7','8','9','0'];
  slots.forEach(function(slot) {
    if (state.favorites[slot]) addedSlots.push(slot);
  });

  var hasAny = addedSlots.length > 0;

  if (!hasAny) {
    var li = document.createElement('li');
    li.className = 'empty';
    li.textContent = 'No favorites yet.';
    ul.appendChild(li);
    hintEl.innerHTML = 'While watching, press a number key <b>3 times</b> to save channel to that slot.';
    favFocus = new FocusList(ul, function(){});
    favFocus.setItems([]);
    updateHomeFocus();
    return;
  }

  addedSlots.forEach(function(slot) {
    var fav = state.favorites[slot];
    var li = document.createElement('li');
    li.innerHTML = '<span class="slot">' + slot + '</span>' + escapeHtml(fav.name);
    li.dataset.slot = slot;
    ul.appendChild(li);
  });

  var freeCount = slots.length - addedSlots.length;
  if (freeCount > 0) {
    hintEl.innerHTML = 'Press a number <b>2×</b> to tune &nbsp;|&nbsp; <b>3×</b> while watching to add/replace slot.';
  } else {
    hintEl.innerHTML = 'Press a number <b>2×</b> to tune &nbsp;|&nbsp; <b>3×</b> while watching to replace a slot.';
  }

  favFocus = new FocusList(ul, function(slot) {
    playFavoriteSlot(slot);
  });
  favFocus.setItems(addedSlots);
  updateHomeFocus();
}

function updateHomeFocus() {
  var browseEl = document.getElementById('browseBtn');
  var logoutEl = document.getElementById('logoutBtn');
  browseEl.classList.toggle('focused', homeBtnFocus === 1);
  logoutEl.classList.toggle('focused', homeBtnFocus === 2);
  if (homeBtnFocus === 0 && favFocus) favFocus.render();
  else if (favFocus) {
    for (var i = 0; i < favFocus.container.children.length; i++)
      favFocus.container.children[i].classList.remove('focused');
  }
}

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, function(c){
    return ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[c];
  });
}

/* ── Favorite slot logic: triple-press to save, double-press to jump ── */
function handleFavKey(slot, isInPlayer) {
  if (!favPressState[slot]) {
    favPressState[slot] = { count: 0, timer: null };
  }
  var ps = favPressState[slot];
  clearTimeout(ps.timer);
  ps.count++;

  if (isInPlayer) {
    if (ps.count === 1) {
      showToast('Press ' + slot + ' again twice to save as Fav ' + slot, 1200);
    } else if (ps.count === 2) {
      showToast('Press ' + slot + ' once more to confirm save...', 1200);
    } else if (ps.count >= 3) {
      ps.count = 0;
      clearTimeout(ps.timer);
      if (state.favorites[slot]) {
        var oldName = state.favorites[slot].name;
        showConfirm(
          'Replace Fav ' + slot + '?\n"' + oldName + '"\n→ "' + state.currentChannel.name + '"',
          function() { doSaveFavorite(slot); }
        );
      } else {
        doSaveFavorite(slot);
      }
      return;
    }
  } else {
    if (ps.count === 1) {
      showToast('Press ' + slot + ' again to tune Fav ' + slot, 1000);
    } else if (ps.count >= 2) {
      ps.count = 0;
      clearTimeout(ps.timer);
      playFavoriteSlot(slot);
      return;
    }
  }

  ps.timer = setTimeout(function(){ ps.count = 0; }, FAV_PRESS_TIMEOUT);
}

function doSaveFavorite(slot) {
  if (!state.currentChannel) return;
  state.favorites[slot] = { stream_id: state.currentChannel.stream_id, name: state.currentChannel.name };
  saveFavorites();
  showToast('\u2605 Saved to Fav ' + slot + ': ' + state.currentChannel.name, 2000);
}

function playFavoriteSlot(slot) {
  var fav = state.favorites[slot];
  if (!fav) { showToast('Fav ' + slot + ' is empty', 1200); return; }
  playChannel(fav);
}

/* ── Categories ── */
function loadCategories() {
  document.getElementById('catStatus').textContent = 'Loading...';
  showScreen('catScreen');
  fetchJson(apiUrl('get_live_categories'), function(data) {
    state.categories = data || [];
    document.getElementById('catStatus').textContent = '';
    renderCategories();
  }, function(msg) {
    document.getElementById('catStatus').textContent = msg;
  });
}
function renderCategories() {
  var ul = document.getElementById('catList');
  ul.innerHTML = '';
  state.categories.forEach(function(cat) {
    var li = document.createElement('li');
    li.textContent = cat.category_name;
    ul.appendChild(li);
  });
  catFocus = new FocusList(ul, function(cat){ loadChannels(cat); });
  catFocus.setItems(state.categories);
}

/* ── Channels ── */
function loadChannels(cat) {
  document.getElementById('chanTitle').textContent = cat.category_name;
  document.getElementById('chanStatus').textContent = 'Loading...';
  showScreen('chanScreen');
  fetchJson(apiUrl('get_live_streams', '&category_id=' + encodeURIComponent(cat.category_id)), function(data) {
    state.channels = data || [];
    document.getElementById('chanStatus').textContent = '';
    renderChannels();
  }, function(msg) {
    document.getElementById('chanStatus').textContent = msg;
  });
}
function renderChannels() {
  var ul = document.getElementById('chanList');
  ul.innerHTML = '';
  state.channels.forEach(function(ch) {
    var li = document.createElement('li');
    li.textContent = ch.name;
    ul.appendChild(li);
  });
  chanFocus = new FocusList(ul, function(ch, idx) {
    state.currentChanIndex = idx;
    playChannel(ch);
  });
  chanFocus.setItems(state.channels);
}

/* ══════════════════════════════
   PLAYER
   Driven by real <video> events ('playing' / 'waiting' / 'error'),
   not by whether a particular play() promise resolved. A play() call
   can be rejected (e.g. a stray pause()/load() race when hls.js attaches
   media) even while the element goes on to actually start rendering
   frames moments later — that mismatch was exactly why the old version
   showed a false "press OK" error with live video visible behind it,
   and why audio never got unmuted (the unmute only ran on the success
   path of that unreliable promise chain).
══════════════════════════════ */
var videoEl = document.getElementById('video');
var hls = null;
var playerErrorActive = false;
var playStarted = false;
var playWatchdog = null;

function streamUrl(ch) {
  return state.server.replace(/\/$/, '') + '/live/' +
    encodeURIComponent(state.user) + '/' + encodeURIComponent(state.pass) + '/' +
    ch.stream_id + '.m3u8';
}

function destroyHls() {
  if (hls) {
    try { hls.destroy(); } catch (e) {}
    hls = null;
  }
}

function setPlayerState(s, msg) {
  playerErrorActive = (s === 'error');
  var el = document.getElementById('playerStatus');
  el.className = 'player-status ' + s;
  if (s === 'loading') {
    el.innerHTML = '<div class="spinner"></div><div>Loading…</div>';
  } else if (s === 'error') {
    el.innerHTML = '<div class="err-icon">&#9888;</div>' +
      '<div>' + escapeHtml(msg || 'Playback error') + '</div>' +
      '<div class="err-hint">Press OK to retry</div>';
  } else {
    el.innerHTML = '';
  }
}

function attemptPlay() {
  var p = videoEl.play();
  if (p && p.catch) p.catch(function () { /* ignored — watchdog covers it */ });
}

/* One-time listeners on the single shared <video> element. These reflect
   what the element is actually doing, so the UI and audio always match
   real playback state regardless of how many play() calls were issued. */
/* ── Cloud Phone audio channel unlock ──
   The Cloud Phone media channel can stay muted/suspended until a
   volume event or AudioContext.resume() wakes it up. We mirror the
   exact fix from the Audio API Test Suite: create/resume an
   AudioContext and poke volumeManager, all synchronously inside the
   'play' event so it happens within the user-gesture window. */
function unlockAudioChannel() {
  if (!window._iptvAudioCtx) {
    try { window._iptvAudioCtx = new (window.AudioContext || window.webkitAudioContext)(); } catch (e) {}
  }
  if (window._iptvAudioCtx && window._iptvAudioCtx.state === 'suspended') {
    try { window._iptvAudioCtx.resume(); } catch (e) {}
  }
  if (navigator.volumeManager && navigator.volumeManager.requestUp) {
    try { navigator.volumeManager.requestUp(); } catch (e) {}
  }
}

videoEl.addEventListener('play', unlockAudioChannel);

videoEl.addEventListener('playing', function () {
  playStarted = true;
  clearTimeout(playWatchdog);
  setPlayerState('idle');
  /* Unmute after a short gap — Cloud Phone needs the channel
     unlocked (above) before the muted flag can actually be cleared.
     200 ms is enough for the AudioContext resume to complete. */
  setTimeout(function () {
    try { videoEl.muted = false; videoEl.volume = 1.0; } catch (e) {}
  }, 200);
});
videoEl.addEventListener('waiting', function () {
  if (!playerErrorActive) setPlayerState('loading');
});
videoEl.addEventListener('error', function () {
  setPlayerState('error', 'Could not load stream');
});

function playChannel(ch) {
  state.currentChannel = { stream_id: ch.stream_id, name: ch.name };

  destroyHls();
  clearTimeout(playWatchdog);
  playStarted = false;

  videoEl.muted = true; // start muted so autoplay is always allowed; unlocked & unmuted once 'playing' fires
  videoEl.volume = 1.0; // pre-set volume so it's ready when we unmute
  videoEl.pause();
  videoEl.removeAttribute('src');
  videoEl.load();

  document.getElementById('nowPlaying').textContent = ch.name;
  applyVideoRotation();
  showScreen('playerScreen');
  setPlayerState('loading');

  var url = streamUrl(ch);

  if (window.Hls && window.Hls.isSupported()) {
    hls = new window.Hls({ maxBufferLength: 15, liveSyncDurationCount: 3 });
    hls.loadSource(url);
    hls.attachMedia(videoEl);
    hls.on(window.Hls.Events.MANIFEST_PARSED, attemptPlay);
    hls.on(window.Hls.Events.ERROR, function (event, data) {
      if (!data || !data.fatal) return;
      if (data.type === window.Hls.ErrorTypes.NETWORK_ERROR) {
        try { hls.startLoad(); } catch (e) { setPlayerState('error', 'Network error'); }
      } else if (data.type === window.Hls.ErrorTypes.MEDIA_ERROR) {
        try { hls.recoverMediaError(); } catch (e) { setPlayerState('error', 'Media error'); }
      } else {
        setPlayerState('error', 'Could not load stream');
        destroyHls();
      }
    });
  } else if (videoEl.canPlayType('application/vnd.apple.mpegurl')) {
    videoEl.src = url;
    attemptPlay();
  } else {
    setPlayerState('error', 'HLS playback not supported here');
    return;
  }

  // Fallback: if nothing has actually started playing shortly after we
  // asked it to, try once more. A single watchdog retry instead of a
  // chain of overlapping play() calls avoids the race that caused
  // spurious errors while video was already running underneath.
  playWatchdog = setTimeout(function () {
    if (!playStarted) {
      attemptPlay();
      setTimeout(function () {
        if (!playStarted) setPlayerState('error', 'Press OK to retry');
      }, 1500);
    }
  }, 1500);
}

function retryCurrentChannel() {
  if (state.currentChannel) playChannel(state.currentChannel);
}

function stopPlayer() {
  closeChannelOsd();
  destroyHls();
  clearTimeout(playWatchdog);
  videoEl.pause();
  videoEl.removeAttribute('src');
  videoEl.load();
  setPlayerState('idle');
  state.currentChannel = null;
  goBack();
}

/* ── Video rotation (press 0) ── */
function toggleRotation() {
  state.videoRotated = !state.videoRotated;
  applyVideoRotation();
  showToast(state.videoRotated ? '\u21BB ROTATED — \u2190\u2192 change channel' : '\u21BA NORMAL', 1500);
}
function applyVideoRotation() {
  var rotateTag = document.getElementById('rotateTag');
  if (state.videoRotated) {
    videoEl.className = 'rotated';
    rotateTag.style.display = 'inline-block';
  } else {
    videoEl.className = '';
    rotateTag.style.display = 'none';
  }
}

/* ── In-player Channel OSD (zapper overlay) ──
   Lets the user browse the channel list without leaving the player.
   Up/Down (or Left/Right when rotated) opens a panel; further presses
   move the highlight only. The highlighted channel is committed
   (played) on Enter/Right, or automatically after a short pause. */
var osdState = { open: false, index: -1, timer: null };
var OSD_AUTO_COMMIT_MS = 2200;

function openChannelOsd(dir) {
  if (!state.channels || !state.channels.length) {
    showToast('No channel list loaded', 1200);
    return;
  }
  if (!osdState.open) {
    osdState.open = true;
    osdState.index = state.currentChanIndex >= 0 ? state.currentChanIndex : 0;
    renderChannelOsd();
    document.getElementById('channelOsd').classList.add('open');
  } else if (dir) {
    moveChannelOsd(dir);
    return;
  }
  resetOsdTimer();
}
function moveChannelOsd(dir) {
  var n = state.channels.length;
  if (!n) return;
  osdState.index = (osdState.index + dir + n) % n;
  renderChannelOsd();
  resetOsdTimer();
}
function renderChannelOsd() {
  var ul = document.getElementById('channelOsdList');
  ul.innerHTML = '';
  state.channels.forEach(function (ch, i) {
    var li = document.createElement('li');
    li.textContent = ch.name;
    if (i === osdState.index) li.className = 'focused';
    ul.appendChild(li);
  });
  var focusedEl = ul.children[osdState.index];
  if (focusedEl && focusedEl.scrollIntoView) focusedEl.scrollIntoView({ block: 'center' });
}
function resetOsdTimer() {
  clearTimeout(osdState.timer);
  osdState.timer = setTimeout(commitChannelOsd, OSD_AUTO_COMMIT_MS);
}
function commitChannelOsd() {
  if (!osdState.open) return;
  var idx = osdState.index;
  closeChannelOsd();
  if (idx !== state.currentChanIndex && state.channels[idx]) {
    state.currentChanIndex = idx;
    playChannel(state.channels[idx]);
  }
}
function cancelChannelOsd() {
  closeChannelOsd();
}
function closeChannelOsd() {
  clearTimeout(osdState.timer);
  osdState.open = false;
  document.getElementById('channelOsd').classList.remove('open');
}

/* ── Keyboard handler ── */
document.addEventListener('keydown', function(e) {
  var key = e.key;

  /* Confirm dialog intercepts everything */
  if (document.getElementById('confirmDlg').classList.contains('active')) {
    if (key === 'ArrowLeft' || key === 'ArrowRight') {
      confirmFocus = confirmFocus === 0 ? 1 : 0;
      updateConfirmFocus();
      e.preventDefault();
    } else if (key === 'Enter' || key === 'SoftLeft') {
      if (confirmFocus === 0) { confirmCallback.ok(); } else { confirmCallback.no(); }
      closeConfirm();
      e.preventDefault();
    } else if (key === 'Backspace' || key === 'SoftRight' || key === 'Escape') {
      handleBackAction();
      e.preventDefault();
    }
    return;
  }

  /* Right Soft Key fallback (the real RSK is handled via the 'back' event
     listener above; this covers simulators/keyboards that send a key instead) */
  if (key === 'SoftRight' || key === 'F2') {
    handleBackAction();
    e.preventDefault();
    return;
  }

  var activeId = document.querySelector('.screen.active').id;

  /* Digit keys: let them type freely on login screen, otherwise favorites */
  if (/^[0-9]$/.test(key)) {
    if (activeId === 'loginScreen') return;
    if (activeId === 'playerScreen' && osdState.open) cancelChannelOsd();
    handleFavKey(key, activeId === 'playerScreen');
    e.preventDefault();
    return;
  }

  /* Volume hint: * and # anywhere in player */
  if (key === '*' || key === '#') {
    if (activeId === 'playerScreen') {
      showToast(key === '#' ? '\u25B2 VOL UP' : '\u25BC VOL DOWN', 600);
    }
    return;
  }

  /* ── Player screen ── */
  if (activeId === 'playerScreen') {

    if (osdState.open) {
      if (key === 'ArrowUp') { moveChannelOsd(-1); e.preventDefault(); }
      else if (key === 'ArrowDown') { moveChannelOsd(1); e.preventDefault(); }
      else if (key === 'Enter' || key === 'ArrowRight') { commitChannelOsd(); e.preventDefault(); }
      else if (key === 'ArrowLeft' || key === 'Backspace') { cancelChannelOsd(); e.preventDefault(); }
      return;
    }

    if (key === 'Enter' && playerErrorActive) { retryCurrentChannel(); e.preventDefault(); return; }
    if (key === '0') { toggleRotation(); e.preventDefault(); return; }

    var isRotated = state.videoRotated;
    if (!isRotated) {
      if (key === 'ArrowUp')        { openChannelOsd(-1); e.preventDefault(); }
      else if (key === 'ArrowDown') { openChannelOsd(1);  e.preventDefault(); }
      else if (key === 'ArrowLeft' || key === 'Backspace') { stopPlayer(); e.preventDefault(); }
      else if (key === 'ArrowRight') { e.preventDefault(); }
    } else {
      if (key === 'ArrowLeft')       { openChannelOsd(-1); e.preventDefault(); }
      else if (key === 'ArrowRight') { openChannelOsd(1);  e.preventDefault(); }
      else if (key === 'ArrowUp')    { e.preventDefault(); }
      else if (key === 'ArrowDown')  { e.preventDefault(); }
      else if (key === 'Backspace')  { stopPlayer(); e.preventDefault(); }
    }
    return;
  }

  /* ── Login screen ── */
  if (activeId === 'loginScreen') {
    if (key === 'Enter') {
      if (document.activeElement.id === 'loginBtn' ||
          document.activeElement.tagName === 'BODY') {
        doLoginFromForm(); e.preventDefault();
      }
    }
    return;
  }

  /* ── Home screen ── */
  if (activeId === 'homeScreen') {
    if (key === 'ArrowDown') {
      if (homeBtnFocus === 0 && favFocus && favFocus.items.length > 0 &&
          favFocus.index < favFocus.items.length - 1) {
        favFocus.move(1);
      } else if (homeBtnFocus === 0) {
        homeBtnFocus = 1;
      } else {
        homeBtnFocus = Math.min(2, homeBtnFocus + 1);
      }
      updateHomeFocus(); e.preventDefault();
    } else if (key === 'ArrowUp') {
      if (homeBtnFocus === 0 && favFocus) {
        if (favFocus.index > 0) favFocus.move(-1);
      } else if (homeBtnFocus === 1) {
        homeBtnFocus = 0;
      } else {
        homeBtnFocus = Math.max(0, homeBtnFocus - 1);
      }
      updateHomeFocus(); e.preventDefault();
    } else if (key === 'Enter' || key === 'ArrowRight') {
      if (homeBtnFocus === 0 && favFocus) favFocus.select();
      else if (homeBtnFocus === 1) loadCategories();
      else if (homeBtnFocus === 2) logout();
      e.preventDefault();
    } else if (key === 'ArrowLeft' || key === 'Backspace') {
      handleBackAction(); e.preventDefault();
    }
    return;
  }

  /* ── Category screen ── */
  if (activeId === 'catScreen' && catFocus) {
    if (key === 'ArrowDown') { catFocus.move(1); e.preventDefault(); }
    else if (key === 'ArrowUp') { catFocus.move(-1); e.preventDefault(); }
    else if (key === 'Enter' || key === 'ArrowRight') { catFocus.select(); e.preventDefault(); }
    else if (key === 'ArrowLeft' || key === 'Backspace') { handleBackAction(); e.preventDefault(); }
    return;
  }

  /* ── Channel screen ── */
  if (activeId === 'chanScreen' && chanFocus) {
    if (key === 'ArrowDown') { chanFocus.move(1); e.preventDefault(); }
    else if (key === 'ArrowUp') { chanFocus.move(-1); e.preventDefault(); }
    else if (key === 'Enter' || key === 'ArrowRight') { chanFocus.select(); e.preventDefault(); }
    else if (key === 'ArrowLeft' || key === 'Backspace') { handleBackAction(); e.preventDefault(); }
    return;
  }
});

/* ── Touch/click fallbacks ── */
document.getElementById('loginBtn').addEventListener('click', doLoginFromForm);
document.getElementById('browseBtn').addEventListener('click', loadCategories);
document.getElementById('logoutBtn').addEventListener('click', logout);

document.getElementById('favList').addEventListener('click', function(e) {
  var li = e.target.closest('li');
  if (!li || !li.dataset.slot) return;
  playFavoriteSlot(li.dataset.slot);
});
document.getElementById('catList').addEventListener('click', function(e) {
  var li = e.target.closest('li');
  if (!li || !catFocus) return;
  var idx = Array.prototype.indexOf.call(li.parentNode.children, li);
  catFocus.index = idx; catFocus.select();
});
document.getElementById('chanList').addEventListener('click', function(e) {
  var li = e.target.closest('li');
  if (!li || !chanFocus) return;
  var idx = Array.prototype.indexOf.call(li.parentNode.children, li);
  chanFocus.index = idx; chanFocus.select();
});
document.getElementById('channelOsdList').addEventListener('click', function(e) {
  var li = e.target.closest('li');
  if (!li) return;
  var idx = Array.prototype.indexOf.call(li.parentNode.children, li);
  osdState.index = idx;
  commitChannelOsd();
});

/* ── Init ── */
loadFavorites();
tryAutoLogin();

/* ── PWA service worker (no-op on Cloud Phone, which doesn't support Service
     Workers — harmless elsewhere since registration failures are caught) ── */
if ('serviceWorker' in navigator) {
  window.addEventListener('load', function() {
    navigator.serviceWorker.register('./sw.js').catch(function(){});
  });
}
</script>
